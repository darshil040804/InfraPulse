input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["application-logs"]
    group_id => "infrapulse-logstash"
    auto_offset_reset => "earliest"
    codec => json
  }
}

filter {
  mutate {
    add_field => {
      "pipeline" => "infrapulse-application-logs"
      "environment" => "local-demo"
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "infrapulse-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}
