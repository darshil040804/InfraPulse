---
- name: Validate Docker Compose configuration
  ansible.builtin.command: docker compose config --quiet
  args:
    chdir: "{{ infrapulse_project_dir }}"
  changed_when: false

- name: Start InfraPulse Compose stack
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ infrapulse_project_dir }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout"

- name: Wait for FastAPI health endpoint
  ansible.builtin.uri:
    url: "{{ infrapulse_health_url }}"
    method: GET
    status_code: 200
    return_content: true
  register: health_check
  retries: 20
  delay: 3
  until: health_check.status == 200

- name: Show API health response
  ansible.builtin.debug:
    var: health_check.json
